{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">ورود به حساب کاربری</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">نام کاربری</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">رمز عبور</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">ورود</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url "register" %}">حساب کاربری ندارید؟ ایجاد کنید</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
